name: tistory auto

on:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: install
      run: pip install requests

    - name: run
      run: python post.py
